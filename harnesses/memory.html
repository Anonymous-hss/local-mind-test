<!DOCTYPE html>
<!--
  Memory Test Harness — loads real memory.css + memory.js
  outside of VS Code with mocked acquireVsCodeApi.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/media/memory.css" rel="stylesheet">
    <title>Repo Memory — Test Harness</title>
    <style>
        :root {
            --vscode-editor-background: #1e1e1e;
            --vscode-editor-foreground: #cccccc;
            --vscode-sideBar-background: #252526;
            --vscode-sideBarTitle-foreground: #bbbbbb;
            --vscode-input-background: #3c3c3c;
            --vscode-input-foreground: #cccccc;
            --vscode-input-border: #555555;
            --vscode-button-background: #0e639c;
            --vscode-button-foreground: #ffffff;
            --vscode-button-hoverBackground: #1177bb;
            --vscode-focusBorder: #007fd4;
            --vscode-textLink-foreground: #3794ff;
            --vscode-errorForeground: #f48771;
            --vscode-list-hoverBackground: #2a2d2e;
            --vscode-badge-background: #4d4d4d;
            --vscode-badge-foreground: #cccccc;
            --vscode-scrollbarSlider-background: rgba(121, 121, 121, 0.4);
            --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --vscode-font-size: 13px;
        }
        body {
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
        }
    </style>
    <script>
        window.__testMessages = [];
        function acquireVsCodeApi() {
            return {
                postMessage(msg) { window.__testMessages.push(msg); },
                getState() { return null; },
                setState(s) { return s; },
            };
        }
        window.__injectMessage = function(data) {
            window.dispatchEvent(new MessageEvent('message', { data }));
        };
        window.__clearMessages = function() { window.__testMessages = []; };

        window.__setState = function(stateName) {
            window.__clearMessages();
            const F = window.__FIXTURES;
            switch (stateName) {
                case 'initial': break;
                case 'stats-loaded':
                    window.__injectMessage(F.MEMORY_PROGRESS_100);
                    window.__injectMessage(F.MEMORY_STATS_LOADED);
                    break;
                case 'scanning-50':
                    window.__injectMessage(F.MEMORY_PROGRESS_50);
                    break;
                case 'scan-complete':
                    window.__injectMessage(F.MEMORY_PROGRESS_100);
                    window.__injectMessage(F.MEMORY_STATS_LOADED);
                    break;
                case 'scan-error':
                    window.__injectMessage(F.MEMORY_PROGRESS_0);
                    window.__injectMessage(F.MEMORY_STATS_ERROR);
                    break;
            }
        };
    </script>
    <script src="/fixtures.js"></script>
    <script>
        window.__FIXTURES = (typeof module !== 'undefined' && module.exports)
            ? module.exports : window.__FIXTURES_GLOBAL || {};
    </script>
</head>
<body>
    <!-- Exact copy of RepoMemoryManager._getHtmlForWebview() -->
    <div class="dashboard-header">
        <h1>
            <span class="icon">🧠</span>
            <span>Repo Memory</span>
        </h1>
        <div class="header-actions">
            <button class="btn btn-primary" id="btnRefresh">↻ Refresh</button>
            <button class="btn" id="btnAddEntry">+ Add Entry</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">
                <span class="card-title">Tech Stack</span>
                <span id="confidenceOverview"></span>
            </div>
            <div class="tag-container" id="techStackList">
                <span class="empty-state">Scanning...</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Architecture</span>
            </div>
            <div class="stat-list">
                <div class="stat-item">
                    <span class="stat-label">Pattern</span>
                    <span class="stat-value" id="architectureType">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Entry Points</span>
                    <span class="stat-value" id="entryPoints">—</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Codestyle &amp; Conventions</span>
            </div>
            <ul class="stat-list" id="conventionsList">
                <li class="stat-item"><span class="stat-label">Scanning...</span></li>
            </ul>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Indexing Status</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Last Full Scan</span>
            <span class="stat-value" id="lastScan">—</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="scanProgressBar"></div>
            </div>
            <div class="status-row">
                <span id="scanStatusText">Idle</span>
                <span id="totalFiles">0 files indexed</span>
            </div>
        </div>
    </div>

    <div class="add-entry-form" id="addEntryForm">
        <div class="form-row">
            <input class="form-input" id="entryCategory" placeholder="Category (e.g. techStack)" autocomplete="off">
            <input class="form-input" id="entryKey" placeholder="Key (e.g. framework)" autocomplete="off">
        </div>
        <div class="form-row">
            <input class="form-input" id="entryValue" placeholder="Value (e.g. React)" autocomplete="off">
            <button class="btn btn-primary" id="btnSubmitEntry">Save</button>
        </div>
    </div>

    <script src="/media/memory.js"></script>
</body>
</html>
